name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        # BACKEND_BASE_URL: đặt trong Settings → Secrets and variables → Actions → Variables
        # trỏ về backend production (vd https://calories-api.onrender.com)
        run: >
          flutter build web --release --base-href /Calories-Tracking-App/
          --dart-define=BACKEND_BASE_URL=${{ vars.BACKEND_BASE_URL || 'http://localhost:5210' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
